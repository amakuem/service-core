version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports: 
      - "80:80"
    restart: always
    depends_on:
      - backend

volumes:
  postgres_data: